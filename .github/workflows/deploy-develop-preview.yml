name: Deploy Develop Preview

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Prepare preview build
        run: |
          mkdir -p preview
          rsync -av --exclude '.git' --exclude '.github' ./ ./preview/

          python3 <<'PY'
          from pathlib import Path
          import json
          import re

          PREVIEW_BASE = '/archery-journal/dev/'

          index = Path('preview/index.html')
          if index.exists():
            html = index.read_text(encoding='utf-8')

            html = html.replace(
              '<title>Журнал лучника</title>',
              '<title>Журнал лучника DEV</title>'
            )

            html = re.sub(
              r'<meta name="apple-mobile-web-app-title" content="[^"]+" />',
              '<meta name="apple-mobile-web-app-title" content="Archery DEV" />',
              html
            )

            # Cache-bust manifest and service worker references for iOS Home Screen PWA.
            html = html.replace(
              '<link rel="manifest" href="./manifest.webmanifest" />',
              '<link rel="manifest" href="./manifest.webmanifest?v=dev" />'
            )
            html = html.replace(
              "navigator.serviceWorker.register('./sw.js')",
              "navigator.serviceWorker.register('./sw.js?v=dev', { scope: './' })"
            )

            index.write_text(html, encoding='utf-8')

          manifest = Path('preview/manifest.webmanifest')
          if manifest.exists():
            data = json.loads(manifest.read_text(encoding='utf-8'))
            data['name'] = 'Журнал лучника DEV'
            data['short_name'] = 'Лучник DEV'
            data['id'] = PREVIEW_BASE
            data['start_url'] = PREVIEW_BASE + '?devPwa=1'
            data['scope'] = PREVIEW_BASE
            manifest.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          sw = Path('preview/sw.js')
          if sw.exists():
            text = sw.read_text(encoding='utf-8')
            text = text.replace('archery-journal-', 'archery-journal-dev-')
            text = text.replace("const APP_VERSION = '1.16';", "const APP_VERSION = 'DEV';")
            sw.write_text(text, encoding='utf-8')
          PY

      - name: Deploy preview to gh-pages/dev
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          destination_dir: dev
          publish_dir: ./preview
          keep_files: true

name: Patch production service worker dev bypass

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/patch-prod-sw-dev-bypass.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch sw.js
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('sw.js')
          text = path.read_text(encoding='utf-8')

          text = text.replace(
              "const CACHE_VERSION = 'archery-journal-v16-restore-1-12-runtime';",
              "const CACHE_VERSION = 'archery-journal-v16-restore-1-12-runtime-dev-bypass';"
          )

          marker = "  if (requestUrl.origin !== self.location.origin) return;\n"
          patch = """  if (requestUrl.pathname.includes('/archery-journal/dev/')) {
    event.respondWith(fetch(event.request, { cache: 'no-store' }));
    return;
  }
"""

          if patch not in text:
              text = text.replace(marker, marker + "\n" + patch)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git commit -m "fix: bypass dev preview in production service worker"
          git push origin HEAD:main

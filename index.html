<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Журнал лучника DEV</title>
  <meta name="description" content="PWA-журнал для учета лучных тренировок, сессий, статистики и экипировки." />
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <meta name="color-scheme" content="light dark" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-32.png" sizes="32x32" />
  <link rel="icon" href="./icons/icon-16.png" sizes="16x16" />
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Archery DEV" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body class="root-mode history-tab">
  <section class="screen active" id="historyScreen">
    <main class="root-app">
      <div class="large-title">История</div>
      <div id="historyList"></div>
    </main>
  </section>

  <section class="screen" id="statsScreen">
    <main class="root-app">
      <div class="large-title">Статистика</div>
      <div class="stats-segmented" id="statsPeriodSeg" aria-label="Период статистики">
        <button class="active" data-period="week">Неделя</button>
        <button data-period="month">Месяц</button>
        <button data-period="quarter">Квартал</button>
        <button data-period="year">Год</button>
      </div>
      <div id="statsContent"></div>
    </main>
  </section>

  <section class="screen" id="equipmentScreen">
    <main class="root-app">
      <div class="equipment-root-nav">
        <div class="large-title">Экипировка</div>
        <button class="equipment-add-btn" id="equipmentAddBtn" data-eq-action="addEquipmentCurrent" aria-label="Добавить">+</button>
      </div>
      <div id="equipmentContent"></div>
    </main>
  </section>

  <section class="screen" id="rootSettingsScreen">
    <main class="root-app">
      <div class="large-title">Настройки</div>
      <section class="group">
        <div class="setting-row"><span class="setting-label">Тёмная тема</span><div class="switch" id="rootThemeSwitch" role="switch" aria-checked="false"></div></div>
      </section>

      <div class="section-title">Данные</div>
      <section class="group">
        <button class="equipment-delete-row" id="importHistoryButton" type="button" style="color:var(--blue)">Импортировать историю</button>
        <button class="equipment-delete-row" id="exportHistoryButton" type="button" style="color:var(--blue)">Экспортировать историю</button>
        <button class="equipment-delete-row" id="importEquipmentButton" type="button" style="color:var(--blue)">Импортировать экипировку</button>
        <button class="equipment-delete-row" id="exportEquipmentButton" type="button" style="color:var(--blue)">Экспортировать экипировку</button>
        <button class="equipment-delete-row" id="resetAppButton" type="button">Очистить</button>
      </section>

      <input type="file" id="importHistoryInput" accept=".json" style="display:none">
      <input type="file" id="importEquipmentInput" accept=".json" style="display:none">
    </main>
  </section>

  <section class="screen" id="sessionScreen">
    <main class="app" id="app">
      <header class="nav">
        <button class="nav-btn" id="backToHistory" aria-label="Назад">‹</button>
        <div><div class="title">Сессия</div><div class="subtitle" id="subtitle"></div></div>
        <button class="nav-btn gear" id="openSettings" aria-label="Настройки"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1A2 2 0 1 1 4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1A2 2 0 1 1 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3 1.7 1.7 0 0 0 1-1.6V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1A2 2 0 1 1 19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.1a2 2 0 1 1 0 4H21a1.7 1.7 0 0 0-1.6 1z"></path></svg></button>
      </header>

      <section class="summary"><div class="total"><span id="totalScore">0</span><span class="denom" id="totalDenom"> / 600</span></div><div class="meta">Средний: <span id="avgScore">0.0</span> · 10: <span id="allTens">0</span> · 9: <span id="allNines">0</span></div></section>
      <section class="note-card" id="noteCard"><div class="note-row"><div class="note-title">Заметка</div><div class="note-value"><span class="note-preview" id="noteContent"></span><span class="note-chevron">›</span></div></div></section>
      <div id="rounds"></div>
    </main>
  </section>

  <aside class="assistant" id="assistant" aria-label="Клавиатура результатов"><div class="keyboard">
    <button class="key yellow" data-v="X">X</button><button class="key yellow" data-v="10">10</button><button class="key yellow" data-v="9">9</button><button class="key red" data-v="8">8</button>
    <button class="key red" data-v="7">7</button><button class="key blue" data-v="6">6</button><button class="key blue" data-v="5">5</button><button class="key black" data-v="4">4</button>
    <button class="key black" data-v="3">3</button><button class="key white" data-v="2">2</button><button class="key white" data-v="1">1</button><button class="key white" data-v="M">M</button>
    <button class="key done" data-v="done">Готово</button></div></aside>

  <nav class="tabbar" aria-label="Основное меню">
    <div class="tabs">
      <button class="tab active" data-tab="history"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 4v5h5"></path><path d="M12 7v6l4 2"></path></svg><span>История</span></button>
      <button class="tab" data-tab="stats"><svg viewBox="0 0 24 24"><path d="M4 19V5"></path><path d="M4 19h16"></path><path d="M8 16v-5"></path><path d="M12 16V8"></path><path d="M16 16v-3"></path></svg><span>Статистика</span></button>
      <button class="tab" data-tab="equipment"><svg viewBox="0 0 24 24"><path d="M10 6V5a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2v1"></path><path d="M5 7h14a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2Z"></path><path d="M3 12h18"></path><path d="M12 11v2"></path></svg><span>Экипировка</span></button>
      <button class="tab" data-tab="settings"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1A2 2 0 1 1 4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1A2 2 0 1 1 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3 1.7 1.7 0 0 0 1-1.6V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1A2 2 0 1 1 19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.1a2 2 0 1 1 0 4H21a1.7 1.7 0 0 0-1.6 1z"></path></svg><span>Настройки</span></button>
    </div>
  </nav>

  <button class="fab" id="createFab" aria-label="Создать сессию">+</button>

  <section class="equipment-screen" id="equipmentDetailScreen" aria-label="Комплект экипировки">
    <div class="settings-nav"><button class="nav-btn" id="closeEquipmentDetail">‹</button><div class="title" id="equipmentDetailNavTitle">Комплект</div><button class="nav-btn" id="equipmentEditBtn" style="font-size:17px;width:auto;padding:0 4px">Править</button></div>
    <div class="equipment-content" id="equipmentDetailContent"></div>
  </section>

  <section class="settings-screen" id="settingsScreen" aria-label="Настройки тренировки">
    <div class="settings-nav"><button class="nav-btn" id="closeSettings">‹</button><div class="title">Настройки</div><button class="nav-btn" id="saveSettings" style="font-size:17px;width:auto;padding:0 4px">Готово</button></div>
    <div class="settings-content">
      <div class="section-title">Тренировка</div>
      <section class="group">
        <label class="setting-row"><span class="setting-label">Дата</span><input class="date-input" id="dateInput" type="date"></label>
        <label class="setting-row"><span class="setting-label">Место</span><input class="text-input" id="placeInput" type="text" placeholder="Не указано"></label>
        <div class="setting-row"><span class="setting-label">Дистанция</span><div class="segmented" id="distanceSeg"><button data-value="10">10 м</button><button data-value="18">18 м</button></div></div>
        <div class="setting-row with-helper"><span class="setting-label">Выстрелы</span><div class="segmented" id="shotsSeg"><button data-value="30">30</button><button data-value="60">60</button></div><div class="setting-helper" id="shotsWarning" style="display:none"></div></div>
        <div class="setting-row"><span class="setting-label">Соревнование</span><div class="switch" id="competitionSwitch" role="switch" aria-checked="false"></div></div>
        <div class="setting-row"><span class="setting-label">Лук</span><select class="text-input" id="sessionBowSelect"></select></div>
        <div class="setting-row"><span class="setting-label">Стрелы</span><select class="text-input" id="sessionArrowSelect"></select></div>
      </section>
    </div>
  </section>

  <section class="create-screen" id="createScreen" aria-label="Создание сессии">
    <div class="settings-nav"><button class="nav-btn" id="closeCreate">‹</button><div class="title">Новая сессия</div><button class="nav-btn" id="createDoneTop" style="font-size:17px;width:auto;padding:0 4px">Создать</button></div>
    <div class="settings-content">
      <div class="section-title">Параметры</div>
      <section class="group">
        <label class="setting-row"><span class="setting-label">Дата</span><input class="date-input" id="createDateInput" type="date"></label>
        <div class="setting-row"><span class="setting-label">Дистанция</span><div class="segmented" id="createDistanceSeg"><button data-value="10">10 м</button><button data-value="18">18 м</button></div></div>
        <div class="setting-row"><span class="setting-label">Выстрелы</span><div class="segmented" id="createShotsSeg"><button data-value="30">30</button><button data-value="60">60</button></div></div>
        <div class="setting-row"><span class="setting-label">Соревнование</span><div class="switch" id="createCompetitionSwitch" role="switch" aria-checked="false"></div></div>
        <div class="setting-row"><span class="setting-label">Лук</span><select class="text-input" id="createBowSelect"></select></div>
        <div class="setting-row"><span class="setting-label">Стрелы</span><select class="text-input" id="createArrowSelect"></select></div>
        <label class="setting-row"><span class="setting-label">Место</span><input class="text-input" id="createPlaceInput" type="text" placeholder="Не указано"></label>
      </section>
      <button class="primary-btn" id="createSessionBtn">Создать</button>
    </div>
  </section>

  <section class="note-screen" id="noteScreen" aria-label="Заметка к сессии">
    <div class="settings-nav"><button class="nav-btn" id="closeNote">‹</button><div class="title">Заметка</div><button class="nav-btn" id="saveNote" style="font-size:17px;width:auto;padding:0 4px">Готово</button></div>
    <div class="note-editor">
      <textarea class="note-textarea" id="noteInput" placeholder="Введите заметку"></textarea>
    </div>
  </section>

  <section class="note-screen" id="seriesCommentScreen" aria-label="Комментарий к серии">
    <div class="settings-nav"><button class="nav-btn" id="closeSeriesComment">‹</button><div class="title" id="seriesCommentTitle">Комментарий</div><button class="nav-btn" id="saveSeriesComment" style="font-size:17px;width:auto;padding:0 4px">Готово</button></div>
    <div class="note-editor">
      <textarea class="note-textarea" id="seriesCommentInput" placeholder="Добавить комментарий к серии"></textarea>
    </div>
  </section>

  <script src="./js/app.js" defer></script>
  <script src="./js/runtime.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(console.error);
      });
    }
  </script>
</body>
</html>
